<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ER Dashboard</title>
  <style>
    :root{
      --bg1:#050b14;
      --bg2:#0a1422;
      --panel:rgba(11,22,38,.82);
      --line:rgba(255,255,255,.08);
      --text:#eef4ff;
      --muted:#9db0cf;
      --blue:#4f8cff;
      --blue-dark:#1b4b9e;
      --teal:#18c2b0;
      --teal-dark:#0d766d;
      --shadow:0 24px 60px rgba(0,0,0,.38);
      --radius:28px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(79,140,255,.18), transparent 25%),
        radial-gradient(circle at 85% 15%, rgba(24,194,176,.14), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(79,140,255,.08), transparent 28%),
        linear-gradient(180deg,var(--bg1) 0%, var(--bg2) 55%, #0b1728 100%);
      overflow:hidden;
    }

    .bg-orb,
    .bg-orb-2,
    .grid-overlay{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
    }

    .bg-orb::before{
      content:"";
      position:absolute;
      width:300px;
      height:300px;
      left:-80px;
      top:80px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(79,140,255,.16), transparent 65%);
      filter:blur(12px);
    }

    .bg-orb::after{
      content:"";
      position:absolute;
      width:260px;
      height:260px;
      right:-60px;
      bottom:50px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(24,194,176,.14), transparent 65%);
      filter:blur(10px);
    }

    .bg-orb-2::before{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      right:18%;
      top:18%;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,.05), transparent 70%);
      filter:blur(16px);
    }

    .grid-overlay{
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.35), transparent 85%);
    }

    .page{
      position:relative;
      z-index:1;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
    }

    .shell{
      width:min(1050px,100%);
      background:linear-gradient(180deg, rgba(12,23,39,.92), rgba(9,18,31,.90));
      border:1px solid var(--line);
      border-radius:34px;
      box-shadow:var(--shadow);
      overflow:hidden;
      backdrop-filter:blur(14px);
    }

    .marquee-wrap{
      position:relative;
      height:48px;
      display:flex;
      align-items:center;
      overflow:hidden;
      border-bottom:1px solid rgba(255,255,255,.06);
      background:linear-gradient(90deg, rgba(79,140,255,.10), rgba(24,194,176,.08));
    }

    .marquee-wrap::before,
    .marquee-wrap::after{
      content:"";
      position:absolute;
      top:0;
      width:90px;
      height:100%;
      z-index:2;
      pointer-events:none;
    }

    .marquee-wrap::before{
      left:0;
      background:linear-gradient(90deg, rgba(10,20,34,1), rgba(10,20,34,0));
    }

    .marquee-wrap::after{
      right:0;
      background:linear-gradient(270deg, rgba(10,20,34,1), rgba(10,20,34,0));
    }

    .marquee{
      white-space:nowrap;
      display:inline-block;
      padding-left:100%;
      animation:scrollLeft 14s linear infinite;
      font-size:15px;
      font-weight:800;
      letter-spacing:.35em;
      text-transform:uppercase;
      color:#dce8ff;
      text-shadow:0 0 18px rgba(79,140,255,.25);
    }

    @keyframes scrollLeft{
      0%{transform:translateX(0)}
      100%{transform:translateX(-100%)}
    }

    .content{
      padding:56px 42px 46px;
      text-align:center;
    }

    .heading{
      margin:0;
      font-size:64px;
      line-height:1;
      font-weight:900;
      letter-spacing:-.04em;
      color:#f4f8ff;
      text-shadow:0 8px 30px rgba(0,0,0,.25);
    }

    .heading span{
      background:linear-gradient(90deg, var(--blue), var(--teal));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      color:transparent;
    }

    .subtle-line{
      width:110px;
      height:4px;
      margin:18px auto 0;
      border-radius:999px;
      background:linear-gradient(90deg, var(--blue), var(--teal));
      box-shadow:0 0 20px rgba(79,140,255,.25);
    }

    .button-grid{
      margin-top:52px;
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:22px;
    }

    .dash-btn{
      position:relative;
      min-height:210px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:flex-start;
      text-align:left;
      padding:28px;
      border-radius:28px;
      text-decoration:none;
      color:white;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 18px 38px rgba(0,0,0,.24);
      transition:transform .22s ease, box-shadow .22s ease, filter .22s ease;
    }

    .dash-btn:hover{
      transform:translateY(-6px);
      box-shadow:0 26px 50px rgba(0,0,0,.34);
      filter:brightness(1.05);
    }

    .dash-btn::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.10), transparent 55%);
      pointer-events:none;
    }

    .dash-btn::after{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      right:-55px;
      top:-55px;
      border-radius:50%;
      background:rgba(255,255,255,.08);
      filter:blur(10px);
      pointer-events:none;
    }

    .tat{
      background:linear-gradient(145deg, #0f2554, #183d95);
    }

    .unbilled{
      background:linear-gradient(145deg, #06352b, #0a6a53);
    }

    .icon-box{
      width:62px;
      height:62px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.16);
      margin-bottom:18px;
      backdrop-filter:blur(10px);
    }

    .btn-title{
      font-size:32px;
      font-weight:900;
      letter-spacing:-.02em;
      margin:0;
    }

    .btn-note{
      margin-top:10px;
      font-size:15px;
      line-height:1.7;
      color:rgba(255,255,255,.84);
      max-width:320px;
    }

    .btn-footer{
      margin-top:22px;
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.16);
      font-size:12px;
      font-weight:800;
      letter-spacing:.04em;
    }

    .arrow{
      width:42px;
      height:42px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.16);
      font-size:18px;
      transition:transform .2s ease;
    }

    .dash-btn:hover .arrow{
      transform:translateX(4px);
    }

    @media (max-width: 820px){
      .content{
        padding:40px 20px 30px;
      }
      .heading{
        font-size:44px;
      }
      .button-grid{
        grid-template-columns:1fr;
        margin-top:36px;
      }
      .dash-btn{
        min-height:185px;
      }
    }

    @media (max-width: 480px){
      .page{
        padding:14px;
      }
      .heading{
        font-size:36px;
      }
      .btn-title{
        font-size:28px;
      }
      .marquee{
        font-size:13px;
        letter-spacing:.28em;
      }
    }
  </style>
</head>
<body>
  <div class="bg-orb"></div>
  <div class="bg-orb-2"></div>
  <div class="grid-overlay"></div>

  <div class="page">
    <div class="shell">
      <div class="marquee-wrap">
        <div class="marquee">JobinTech • JobinTech • JobinTech • JobinTech • JobinTech • JobinTech • JobinTech •</div>
      </div>

      <div class="content">
        <h1 class="heading">ER <span>Dashboard</span></h1>
        <div class="subtle-line"></div>

        <div class="button-grid">
          <a class="dash-btn tat" href="Kadesh-ER-Tat.html">
            <div class="icon-box">
              <svg width="30" height="30" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <rect x="3" y="4" width="7" height="7" rx="2" fill="rgba(255,255,255,.96)"/>
                <rect x="14" y="4" width="7" height="7" rx="2" fill="rgba(255,255,255,.55)"/>
                <rect x="3" y="15" width="7" height="6" rx="2" fill="rgba(255,255,255,.55)"/>
                <rect x="14" y="15" width="7" height="6" rx="2" fill="rgba(255,255,255,.88)"/>
              </svg>
            </div>

            <h2 class="btn-title">ER Tat</h2>
            <div class="btn-note">O.</div>

            <div class="btn-footer">
              <span class="tag">Operational</span>
              <span class="arrow">→</span>
            </div>
          </a>

          <a class="dash-btn unbilled" href="Kadesh-ER-Unbilled.html">
            <div class="icon-box">
              <svg width="30" height="30" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 17L9 12L13 15L20 7" stroke="rgba(255,255,255,.96)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="9" cy="12" r="1.9" fill="rgba(255,255,255,.7)"/>
                <circle cx="13" cy="15" r="1.9" fill="rgba(255,255,255,.7)"/>
                <circle cx="20" cy="7" r="1.9" fill="rgba(255,255,255,.96)"/>
              </svg>
            </div>

            <h2 class="btn-title">ER Unbilled</h2>
            <div class="btn-note">Open the unbilled dashboard for ER laboratory and radiology service billing follow-up.</div>

            <div class="btn-footer">
              <span class="tag">Billing</span>
              <span class="arrow">→</span>
            </div>
          </a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
