<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ER Dashboard</title>

<style>
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseRing{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.6);opacity:0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:#06101d;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
  font-family:Segoe UI,Arial,sans-serif;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  color:rgba(255,255,255,.5);
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:25px;
}

.live{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#14b8a6;
  position:relative;
}

.live::after{
  content:'';
  position:absolute;
  inset:-3px;
  border-radius:50%;
  border:1px solid #14b8a6;
  animation:pulseRing 2s infinite;
}

.title{
  font-size:46px;
  color:white;
  font-weight:800;
  margin-bottom:10px;
}

.title span{
  color:#4f8cff;
}

.sub{
  color:rgba(255,255,255,.4);
  margin-bottom:40px;
}

.cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  width:100%;
  max-width:600px;
}

.card{
  padding:28px;
  border-radius:20px;
  color:white;
  text-decoration:none;
  transition:.2s;
  position:relative;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-5px);
}

.card1{
  background:linear-gradient(145deg,#0f2554,#1a3f9e);
}

.card2{
  background:linear-gradient(145deg,#063328,#0a5c47);
}

.card-title{
  font-size:22px;
  font-weight:700;
  margin-bottom:8px;
}

.card-desc{
  font-size:13px;
  color:rgba(255,255,255,.5);
}

.footer{
  margin-top:30px;
  font-size:12px;
  color:rgba(255,255,255,.2);
}

@media(max-width:500px){
  .cards{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="badge"><span class="live"></span> Hospital Dashboard</div>

<div class="title">ER <span>Dashboard</span></div>
<div class="sub">Select a dashboard</div>

<div class="cards">

  <!-- ER TAT -->
  <a class="card card1" href="Kadesh-ER-Tat.html">
    <div class="card-title">ER Tat</div>
    <div class="card-desc">ER turnaround time dashboard</div>
  </a>

  <!-- ER UNBILLED -->
  <a class="card card2" href="Kadesh-ER-Unbilled.html">
    <div class="card-title">ER Unbilled</div>
    <div class="card-desc">Unbilled lab & radiology tracking</div>
  </a>

</div>

<div class="footer">
Keep all files in same GitHub folder
</div>

</body>
</html>
