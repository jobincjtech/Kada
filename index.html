<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ER Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      color: white;
    }

    /* Animated background circles */
    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.35;
      animation: float 10s ease-in-out infinite;
    }

    body::before {
      width: 300px;
      height: 300px;
      background: #00c6ff;
      top: 10%;
      left: 10%;
    }

    body::after {
      width: 280px;
      height: 280px;
      background: #7c3aed;
      bottom: 10%;
      right: 10%;
      animation-delay: 2s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(-20px) translateX(15px); }
    }

    /* Top scrolling brand */
    .marquee {
      position: absolute;
      top: 18px;
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      z-index: 5;
    }

    .marquee span {
      display: inline-block;
      padding-left: 100%;
      animation: marquee 14s linear infinite;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #38bdf8;
      text-shadow: 0 0 12px rgba(56, 189, 248, 0.6);
    }

    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    .container {
      width: 90%;
      max-width: 700px;
      padding: 50px 30px;
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      position: relative;
      z-index: 2;
      animation: fadeUp 1s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon {
      width: 75px;
      height: 75px;
      margin: 0 auto 18px;
      border-radius: 20px;
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.35);
    }

    h1 {
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 16px;
      color: #cbd5e1;
      margin-bottom: 35px;
      line-height: 1.6;
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .dashboard-btn {
      text-decoration: none;
      color: white;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      padding: 12px 24px;
      min-width: 160px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 14px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
      overflow: hidden;
    }

    .dashboard-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.25),
        transparent
      );
      transition: 0.6s;
    }

    .dashboard-btn:hover::before {
      left: 100%;
    }

    .dashboard-btn:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.45);
    }

    .dashboard-btn.secondary {
      background: linear-gradient(135deg, #0f766e, #0ea5a4);
      box-shadow: 0 8px 20px rgba(20, 184, 166, 0.30);
    }

    .dashboard-btn.secondary:hover {
      box-shadow: 0 14px 28px rgba(20, 184, 166, 0.42);
    }

    .footer-text {
      margin-top: 28px;
      font-size: 13px;
      color: #94a3b8;
      letter-spacing: 0.5px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 32px;
      }

      .subtitle {
        font-size: 14px;
      }

      .dashboard-btn {
        width: 100%;
        max-width: 240px;
      }

      .container {
        padding: 40px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="marquee">
    <span>JOBINTECH • JOBINTECH • JOBINTECH • JOBINTECH • JOBINTECH •</span>
  </div>

  <div class="container">
    <div class="icon">🏥</div>
    <h1>ER Dashboard</h1>
    <p class="subtitle">
      Smart access to your emergency dashboards with a clean, modern, and professional interface.
    </p>

    <div class="button-group">
      <a href="Kadesh-ER-Tat.html" class="dashboard-btn">ER Tat</a>
      <a href="Kadesh-ER-Unbilled.html" class="dashboard-btn secondary">ER Unbilled</a>
    </div>

    <div class="footer-text">
      Professional Dashboard Portal
    </div>
  </div>

</body>
</html>
